project_name: system-coach-maintenance-manager
project_type: internal-tool
risk_tier: low
governance_level: 1
# Owner decision 2026-06-07: risk_tier set to low by explicit owner instruction.
# Functional classification is AI-agent-with-tools; the autonomy gate framework
# (Chunk 22) is the compensating control that keeps this acceptable at low/G1.
repository_model: single-repo
owner:
  name: Adam Goodwin
  role: owner
technical_lead:
  name: codex session
  role: technical-lead
status: active
environments:
  - dev
  - staging
  - prod
data_classification:
  handles_sensitive_data: false
  handles_money: false
  notes: ""
controls:
  required_docs:
    - README.md
    - LICENSE
    - CONTRIBUTING.md
    - SECURITY.md
    - SUPPORT.md
    - docs/architecture.md
    - docs/manual.md
    - docs/roadmap.md
    - docs/deployment-guide.md
    - docs/runbook.md
    - docs/action-runner-contract.md
    - docs/system-capability-profile.md
    - docs/model-provider-setup.md
    - docs/public-release-guide.md
    - docs/github-public-alpha-handoff.md
    - docs/privacy-and-safety.md
    - docs/public-walkthrough.md
    - docs/setup-linux.md
    - docs/setup-windows-browser.md
    - docs/release-checklist.md
    - docs/releases/v0.1.0-alpha.md
    - docs/CHANGELOG.md
    - docs/risks/risk-register.md
  machine_enforcement:
    - required-file-check
    - lint
    - tests
    - secret-scan
  action_runner_enabled: true
  elevated_action_runner_enabled: true
exceptions: []
agent_controls:
  applicable: true
  autonomy_level: A1
  model_registry:
    - provider: ollama
      model: qwen3:8b
      role: efficient-local-coach-and-request-brain
    - provider: ollama
      model: gemma4:latest
      role: local-general-reasoning-fallback
    - provider: ollama
      model: deepseek-r1:14b
      role: local-reasoning-escalation
    - provider: ollama
      model: gpt-oss:20b
      role: heavy-local-reasoning-escalation
    - provider: ollama
      model: qwen3-vl:8b
      role: local-vision-capable-fallback
    - provider: ollama
      model: gpt-oss
      role: local-general-fallback-pending-download
  prompt_registry:
    - local-probe-agent-command-set
    - local-ai-coach-system-prompt
    - gemma-request-desk-reasoning-prompt
pop_cosmic_agent:
  web_research_enabled: true
  allowed_domains:
    - system76.com
    - support.system76.com
    - blog.system76.com
    - github.com/pop-os
    - api.github.com/repos/pop-os
    - api.github.com/search/issues
    - ai.google.dev
    - deepmind.google
    - ollama.com
  searxng_url: ""
  research_provider: perplexity
  perplexity_api_key_env_var: PERPLEXITY_API_KEY
  perplexity_model_env_var: PERPLEXITY_MODEL
  master_env_path: /home/adamgoodwin/code/.env.master
  max_results_per_query: 8
  cache_ttl_days: 14
  mode: guided-fix
